<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShauneIA - Intelligence Sans Limite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; color: #e2e8f0; margin: 0; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .error-shake { animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake { 10%, 90% { transform: translate3d(-1px, 0, 0); } 20%, 80% { transform: translate3d(2px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-4px, 0, 0); } 40%, 60% { transform: translate3d(4px, 0, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- CONFIGURATION ---
        const apiKey = "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"; 
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaune-ia-v2';
        
        let firebaseConfig = {};
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "AIzaSyDKi9twN2oJYy_t0GJCBWvAjEqzXNZDhRk",
                authDomain: "shauneia-10301.firebaseapp.com",
                projectId: "shauneia-10301",
                storageBucket: "shauneia-10301.firebasestorage.app",
                messagingSenderId: "1046149320765",
                appId: "1:1046149320765:web:a4ff9e9db7c0cb50161a54"
            };
        } catch(e) { console.error("Firebase config error", e); }

        let db = null;
        let auth = null;
        try {
            if (!window.firebase.apps.length) {
                const app = window.firebase.initializeApp(firebaseConfig);
                db = window.firebase.firestore();
                auth = window.firebase.auth();
            } else {
                db = window.firebase.firestore();
                auth = window.firebase.auth();
            }
        } catch(e) { console.error("Firebase init failed", e); }

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({
                        attrs: { strokeWidth: 2, width: size, height: size, class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const MODES = [
            { id: 'chat', label: 'Conversation', icon: 'message-square', color: 'from-blue-600 to-indigo-600', prompt: "Tu es ShauneIA, un assistant intelligent. Réponds en français de manière concise." },
            { id: 'code', label: 'Code & Dev', icon: 'code', color: 'from-emerald-500 to-teal-600', prompt: "Tu es ShauneIA Code. Expert en développement logiciel." },
            { id: 'image', label: 'Images', icon: 'image', color: 'from-pink-500 to-purple-600', prompt: "Tu es un expert en création de requêtes pour générateurs d'images. Traduis l'idée de l'utilisateur en un prompt descriptif ultra détaillé en anglais. Ne renvoie QUE le texte du prompt en anglais, aucun autre commentaire." },
            { id: 'libre', label: 'Libre', icon: 'zap', color: 'from-orange-500 to-red-600', prompt: "Tu es ShauneIA Libre. Réponds avec franchise et efficacité." }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [threads, setThreads] = useState([]);
            const [currentThreadId, setCurrentThreadId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [activeMode, setActiveMode] = useState(MODES[0]);
            const [isSending, setIsSending] = useState(false);
            
            const [apiKeyStatus, setApiKeyStatus] = useState('checking'); 
            const [dbStatus, setDbStatus] = useState('connecting'); 
            const [lastError, setLastError] = useState(null);

            const messagesEndRef = useRef(null);

            useEffect(() => {
                const checkApiKey = async () => {
                    if (!apiKey) {
                        setApiKeyStatus('invalid');
                        return;
                    }
                    try {
                        const res = await fetch(`https://api.groq.com/openai/v1/models`, {
                            headers: { 'Authorization': `Bearer ${apiKey}` }
                        });
                        if (res.ok) setApiKeyStatus('valid');
                        else setApiKeyStatus('invalid');
                    } catch {
                        setApiKeyStatus('invalid');
                    }
                };
                checkApiKey();
            }, []);

            useEffect(() => {
                const initAuth = async () => {
                    if (!auth) { setLoading(false); return; }
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await auth.signInWithCustomToken(__initial_auth_token);
                        } else {
                            await auth.signInAnonymously();
                        }
                    } catch (err) {
                        setLastError(`Authentification : ${err.message}`);
                    } finally { setLoading(false); }
                };
                initAuth();
                const unsubscribe = auth ? auth.onAuthStateChanged(setUser) : () => {};
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                setDbStatus('online');
                const threadsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads');
                
                return threadsRef.onSnapshot(
                    (snap) => {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setThreads(docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                    }, 
                    (err) => {
                        setDbStatus('error');
                        setLastError(`Firestore Historique : ${err.message}`);
                    }
                );
            }, [user]);

            useEffect(() => {
                if (!user || !currentThreadId || !db) { setMessages([]); return; }
                const msgRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads').doc(currentThreadId).collection('messages');
                
                return msgRef.onSnapshot(
                    (snap) => {
                        const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                        setMessages(docs.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
                    },
                    (err) => setLastError(`Firestore Messages : ${err.message}`)
                );
            }, [user, currentThreadId]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const handleSendMessage = async () => {
                if (!inputValue.trim() || isSending) return;
                if (apiKeyStatus === 'invalid') {
                    setLastError("Le service de génération est indisponible (Clé manquante).");
                    return;
                }
                
                const text = inputValue;
                const isImageMode = activeMode.id === 'image';
                setInputValue('');
                setIsSending(true);
                setLastError(null);

                try {
                    let tId = currentThreadId;
                    
                    if (user && db) {
                        const userThreadsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads');
                        if (!tId) {
                            const res = await userThreadsRef.add({
                                title: text.slice(0, 40) + "...",
                                mode: activeMode.id,
                                createdAt: window.firebase.firestore.FieldValue.serverTimestamp()
                            });
                            tId = res.id;
                            setCurrentThreadId(tId);
                        }
                        await userThreadsRef.doc(tId).collection('messages').add({ 
                            role: 'user', 
                            content: text, 
                            createdAt: window.firebase.firestore.FieldValue.serverTimestamp() 
                        });
                    }

                    let response;
                    let lastErr;
                    for (let i = 0; i < 3; i++) {
                        try {
                            response = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                                method: 'POST',
                                headers: { 
                                    'Content-Type': 'application/json',
                                    'Authorization': `Bearer ${apiKey}`
                                },
                                body: JSON.stringify({
                                    model: "llama-3.3-70b-versatile",
                                    messages: [
                                        { role: "system", content: activeMode.prompt },
                                        { role: "user", content: text }
                                    ],
                                    temperature: 0.7
                                })
                            });
                            if (response.ok) break;
                            const errData = await response.json();
                            lastErr = errData.error?.message || response.statusText;
                        } catch (e) {
                            lastErr = e.message;
                        }
                        await new Promise(r => setTimeout(r, 1000 * (i + 1)));
                    }

                    if (!response || !response.ok) throw new Error(lastErr || "Échec de connexion au service Groq.");

                    const data = await response.json();
                    let reply = data.choices?.[0]?.message?.content;
                    if (!reply) throw new Error("Réponse vide générée par l'IA.");

                    // Intercepter la réponse si on est en mode Image
                    if (isImageMode) {
                        const encodedPrompt = encodeURIComponent(reply);
                        reply = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=1024&height=1024&nologo=true`;
                    }

                    if (user && db && tId) {
                        await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads').doc(tId).collection('messages').add({
                            role: 'assistant',
                            content: reply,
                            createdAt: window.firebase.firestore.FieldValue.serverTimestamp()
                        });
                    }
                } catch (err) {
                    setLastError(`Système : ${err.message}`);
                } finally {
                    setIsSending(false);
                }
            };

            if (loading) return <div className="h-screen flex items-center justify-center bg-[#020617] text-indigo-500 font-bold animate-pulse uppercase tracking-widest text-xs">Chargement de l'environnement ShauneIA...</div>;

            return (
                <div className="flex h-screen bg-[#020617] text-slate-200 overflow-hidden font-sans">
                    {/* Sidebar */}
                    <aside className={`${isSidebarOpen ? 'w-80' : 'w-0'} transition-all duration-300 bg-[#0b1120] border-r border-slate-800 flex flex-col z-20 overflow-hidden`}>
                        <div className="p-6 flex items-center justify-between">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-xl bg-indigo-600 flex items-center justify-center shadow-lg">
                                    <Icon name="infinity" size={24} className="text-white" />
                                </div>
                                <div className="flex flex-col">
                                    <span className="font-bold text-xl italic text-white tracking-tight">ShauneIA</span>
                                    <span className="text-[10px] text-slate-500 font-bold tracking-widest uppercase">Intelligence Private</span>
                                </div>
                            </div>
                            <button onClick={() => setIsSidebarOpen(false)} className="lg:hidden p-2 hover:bg-slate-800 rounded-lg">
                                <Icon name="x" size={20} className="text-slate-500" />
                            </button>
                        </div>

                        <button onClick={() => {setCurrentThreadId(null); setMessages([]);}} className="mx-4 mb-4 p-3 rounded-xl bg-slate-800 hover:bg-slate-700 transition flex items-center justify-center gap-2 text-sm font-semibold border border-slate-700 shadow-inner">
                            <Icon name="plus" size={18}/> Nouvelle session
                        </button>

                        <div className="flex-1 overflow-y-auto px-2 custom-scrollbar">
                            <div className="px-3 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest flex items-center justify-between">
                                <span>Sessions récentes</span>
                                {dbStatus === 'online' && <span className="w-1.5 h-1.5 bg-indigo-500 rounded-full"></span>}
                            </div>
                            {threads.length === 0 && <div className="p-6 text-center text-xs text-slate-600 italic">Aucun historique</div>}
                            {threads.map(t => (
                                <div key={t.id} onClick={() => setCurrentThreadId(t.id)} className={`p-3 mb-1 rounded-xl cursor-pointer flex flex-col gap-1 transition-all ${currentThreadId === t.id ? 'bg-indigo-600/20 border border-indigo-500/50' : 'hover:bg-slate-800/40 border border-transparent'}`}>
                                    <div className="flex items-center gap-2 overflow-hidden">
                                        <Icon name="message-square" size={14} className={currentThreadId === t.id ? 'text-indigo-400' : 'text-slate-600'} />
                                        <span className="truncate text-sm font-medium">{t.title || 'Conversation sans titre'}</span>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </aside>

                    {/* Main Content */}
                    <main className="flex-1 flex flex-col relative min-w-0">
                        <header className="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-[#020617]/50 backdrop-blur-xl shrink-0">
                            <div className="flex items-center gap-4">
                                {!isSidebarOpen && (
                                    <button onClick={() => setIsSidebarOpen(true)} className="p-2 hover:bg-slate-800 rounded-lg">
                                        <Icon name="menu" className="text-slate-400" size={20} />
                                    </button>
                                )}
                                <div className="flex items-center gap-2 overflow-x-auto no-scrollbar">
                                    {MODES.map(m => (
                                        <button key={m.id} onClick={() => setActiveMode(m)} className={`whitespace-nowrap px-3 py-1.5 rounded-lg text-[11px] font-bold transition flex items-center gap-2 ${activeMode.id === m.id ? `bg-gradient-to-r ${m.color} text-white shadow-lg shadow-indigo-500/10` : 'bg-slate-800/50 text-slate-400 hover:text-slate-300'}`}>
                                            <Icon name={m.icon} size={12} />
                                            {m.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-4">
                                <div className="flex flex-col items-end">
                                    <div className="flex items-center gap-2">
                                        <span className="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">GROQ STATUS</span>
                                        <div className={`w-2 h-2 rounded-full ${apiKeyStatus === 'valid' ? 'bg-emerald-500' : apiKeyStatus === 'checking' ? 'bg-yellow-500 animate-pulse' : 'bg-red-500'}`}></div>
                                    </div>
                                    <div className="flex items-center gap-2">
                                        <span className="text-[9px] font-bold text-slate-500 uppercase tracking-tighter">CLOUD SYNC</span>
                                        <div className={`w-2 h-2 rounded-full ${dbStatus === 'online' ? 'bg-emerald-500' : dbStatus === 'connecting' ? 'bg-yellow-500 animate-pulse' : 'bg-red-500'}`}></div>
                                    </div>
                                </div>
                            </div>
                        </header>

                        {/* Error Banner */}
                        {lastError && (
                            <div className="mx-6 mt-4 p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-xs flex items-center justify-between animate-in error-shake">
                                <div className="flex items-center gap-2">
                                    <Icon name="alert-circle" size={14} />
                                    <span><strong>Anomalie :</strong> {lastError}</span>
                                </div>
                                <button onClick={() => setLastError(null)} className="p-1 hover:bg-red-500/20 rounded">
                                    <Icon name="x" size={14} />
                                </button>
                            </div>
                        )}

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            {messages.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-center max-w-sm mx-auto animate-in">
                                    <div className="w-16 h-16 bg-slate-800/50 rounded-2xl flex items-center justify-center border border-slate-700 mb-6 shadow-xl relative">
                                        <Icon name="infinity" size={32} className="text-indigo-400" />
                                        <div className="absolute -top-1 -right-1 w-4 h-4 bg-indigo-500 rounded-full border-2 border-[#020617] flex items-center justify-center">
                                            <div className="w-1.5 h-1.5 bg-white rounded-full animate-ping"></div>
                                        </div>
                                    </div>
                                    <h2 className="text-xl font-bold text-white mb-2 tracking-tight">ShauneIA Opérationnelle</h2>
                                    <p className="text-slate-500 text-sm leading-relaxed mb-8">
                                        Votre interface d'intelligence privée via Groq. Posez une question pour commencer.
                                    </p>
                                    <div className="grid grid-cols-2 gap-3 w-full">
                                        {["Conseils stratégiques", "Analyse de données", "Générer une image", "Résolution technique"].map(prompt => (
                                            <button key={prompt} onClick={() => {setInputValue(prompt)}} className="p-3 text-xs bg-slate-800/30 border border-slate-800 rounded-xl text-slate-400 hover:border-indigo-500/50 hover:text-indigo-400 transition-all text-left">
                                                {prompt}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <div className="max-w-3xl mx-auto space-y-6 pb-4">
                                    {messages.map(m => (
                                        <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in`}>
                                            <div className={`flex items-start gap-3 max-w-[92%] ${m.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 shadow-sm ${m.role === 'user' ? 'bg-indigo-600' : 'bg-slate-800 border border-slate-700'}`}>
                                                    <Icon name={m.role === 'user' ? 'user' : 'bot'} size={16} className={m.role === 'user' ? "text-white" : "text-indigo-400"} />
                                                </div>
                                                <div className={`p-4 rounded-2xl text-[14px] leading-relaxed shadow-sm whitespace-pre-wrap ${m.role === 'user' ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'bg-slate-800 text-slate-200 border border-slate-700/50'}`}>
                                                    {m.content.startsWith('https://image.pollinations.ai') ? (
                                                        <img src={m.content} alt="Génération IA" className="rounded-xl max-w-full h-auto mt-1 shadow-md border border-slate-700/50" />
                                                    ) : (
                                                        m.content
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {isSending && (
                                        <div className="flex items-center gap-3">
                                            <div className="w-8 h-8 rounded-lg bg-slate-800 flex items-center justify-center border border-slate-700">
                                                <Icon name="loader-2" size={16} className="text-indigo-500 animate-spin" />
                                            </div>
                                            <div className="p-4 rounded-2xl bg-slate-800 border border-slate-700/50 text-indigo-400 text-xs italic">
                                                ShauneIA traite votre demande...
                                            </div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                            )}
                        </div>

                        <div className="p-4 md:p-6 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent shrink-0">
                            <div className={`max-w-3xl mx-auto relative bg-slate-900/80 backdrop-blur-md border border-slate-700/80 rounded-2xl flex items-center p-2 shadow-2xl transition-all ${isSending ? 'opacity-70 pointer-events-none' : 'focus-within:border-indigo-500/50'}`}>
                                <textarea 
                                    rows="1"
                                    value={inputValue}
                                    onChange={(e) => {
                                        setInputValue(e.target.value);
                                        e.target.style.height = 'auto';
                                        e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
                                    }}
                                    onKeyDown={(e) => e.key === 'Enter' && !e.shiftKey && (e.preventDefault(), handleSendMessage())}
                                    placeholder={isSending ? "Traitement..." : "Posez votre question à ShauneIA..."}
                                    className="flex-1 bg-transparent border-none focus:ring-0 text-white p-3 resize-none outline-none text-sm max-h-40 custom-scrollbar"
                                />
                                <button 
                                    onClick={handleSendMessage}
                                    disabled={!inputValue.trim() || isSending}
                                    className={`p-3 rounded-xl transition-all ${inputValue.trim() && !isSending ? `bg-indigo-600 text-white hover:scale-105 active:scale-95 shadow-lg shadow-indigo-500/20` : 'bg-slate-800 text-slate-600 cursor-not-allowed'}`}
                                >
                                    {isSending ? <Icon name="loader-2" size={18} className="animate-spin" /> : <Icon name="send" size={18} />}
                                </button>
                            </div>
                            <div className="mt-2 text-center flex items-center justify-center gap-4 text-[9px] text-slate-600 font-medium">
                                <span>ShauneIA V2 (Groq) - Système Privé</span>
                                <span className="flex items-center gap-1 uppercase tracking-tighter opacity-50"><Icon name="shield-check" size={10}/> Connexion Sécurisée</span>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
