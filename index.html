<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus Core AI - Interface de Haute Précision</title>
    
    <!-- Tailwind CSS avec le plugin Typography pour un beau rendu Markdown -->
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    
    <!-- Marked.js pour parser le Markdown -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/11.0.1/marked.min.js"></script>
    
    <!-- Highlight.js pour la coloration syntaxique du code -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
    
    <!-- Polices -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #3b82f6;
            --bg: #020617;
        }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg);
            color: #f8fafc;
        }
        
        /* Cacher la scrollbar standard */
        .scrollbar-hide::-webkit-scrollbar {
            display: none;
        }
        .scrollbar-hide {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        .glass-header {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .chat-bubble-ai {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px 24px 24px 4px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        .chat-bubble-user {
            background: linear-gradient(135deg, #2563eb, #6366f1);
            border-radius: 24px 24px 4px 24px;
            box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4);
        }
        
        .input-container {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .input-container:focus-within {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2), 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 12px #22c55e;
            animation: pulse 2s infinite;
            transition: all 0.3s ease;
        }
        
        @keyframes pulse {
            0% { transform: scale(0.95); opacity: 0.8; }
            50% { transform: scale(1.2); opacity: 1; box-shadow: 0 0 16px #22c55e; }
            100% { transform: scale(0.95); opacity: 0.8; }
        }
        
        /* Personnalisation du rendu Markdown */
        .prose pre {
            background-color: #1a1b26 !important; /* Thème Tokyo Night */
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px !important;
            padding: 1rem !important;
            margin-top: 1rem;
            margin-bottom: 1rem;
        }
        .prose code {
            font-family: 'Fira Code', monospace !important;
            font-size: 0.85em !important;
        }
        .prose p {
            margin-bottom: 0.75em;
            margin-top: 0.75em;
        }
        .prose p:first-child { margin-top: 0; }
        .prose p:last-child { margin-bottom: 0; }
        
        .message-anim {
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }
        
        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .dot-flashing {
            position: relative;
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background-color: #60a5fa;
            color: #60a5fa;
            animation: dot-flashing 1s infinite linear alternate;
            animation-delay: 0.5s;
        }
        .dot-flashing::before, .dot-flashing::after {
            content: '';
            display: inline-block;
            position: absolute;
            top: 0;
            width: 6px;
            height: 6px;
            border-radius: 3px;
            background-color: #60a5fa;
            color: #60a5fa;
            animation: dot-flashing 1s infinite alternate;
        }
        .dot-flashing::before {
            left: -12px;
            animation-delay: 0s;
        }
        .dot-flashing::after {
            left: 12px;
            animation-delay: 1s;
        }
        @keyframes dot-flashing {
            0% { background-color: #60a5fa; }
            50%, 100% { background-color: rgba(96, 165, 250, 0.2); }
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden selection:bg-blue-500/30">

    <!-- Header Fixe -->
    <nav class="glass-header px-4 sm:px-6 py-3 sm:py-4 flex justify-between items-center z-50 shrink-0">
        <div class="flex items-center gap-3 sm:gap-4">
            <div class="h-10 w-10 bg-gradient-to-br from-blue-500 to-indigo-600 rounded-xl sm:rounded-2xl flex items-center justify-center rotate-3 hover:rotate-0 transition-transform duration-300 shadow-lg shadow-blue-500/20">
                <svg viewBox="0 0 24 24" class="w-5 h-5 sm:w-6 sm:h-6 text-white" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path>
                </svg>
            </div>
            <div>
                <h1 class="text-lg sm:text-xl font-bold tracking-tight">Nexus <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-400 font-black">CORE</span></h1>
                <div class="flex items-center gap-2 mt-0.5">
                    <div id="status-indicator" class="pulse-dot"></div>
                    <span id="status-text" class="text-[9px] sm:text-[10px] uppercase font-bold text-slate-400 tracking-widest">Système En Ligne</span>
                </div>
            </div>
        </div>
        <button id="clear-btn" class="p-2 text-slate-400 hover:text-white hover:bg-white/10 rounded-xl transition-all" title="Effacer la mémoire">
            <svg viewBox="0 0 24 24" class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </nav>

    <!-- Zone de Chat Scrollable -->
    <main id="chat-view" class="flex-1 overflow-y-auto px-4 py-6 sm:py-8 space-y-6 sm:space-y-8 scrollbar-hide pb-32 sm:pb-40 w-full max-w-5xl mx-auto">
        <!-- Message de bienvenue -->
        <div class="flex justify-start w-full message-anim">
            <div class="chat-bubble-ai p-5 sm:p-6 max-w-[90%] sm:max-w-[85%]">
                <div class="flex items-center gap-2 mb-3">
                    <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    <h2 class="text-blue-400 font-bold text-xs sm:text-sm uppercase tracking-tighter">Diagnostic : Optimal</h2>
                </div>
                <div class="prose prose-invert max-w-none text-slate-200 text-sm sm:text-base leading-relaxed">
                    <p>Nexus est en ligne. L'interface est stabilisée et l'accès au modèle <strong>Gemini 2.5 Flash</strong> est garanti.</p>
                    <p>Posez-moi votre question ci-dessous, je suis prêt à traiter vos requêtes.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Zone de Saisie Fixe en bas -->
    <div class="absolute bottom-0 left-0 right-0 p-3 sm:p-6 bg-gradient-to-t from-[#020617] via-[#020617]/95 to-transparent z-40">
        <div class="max-w-4xl mx-auto relative">
            <div class="input-container p-2 sm:p-3 rounded-2xl sm:rounded-3xl shadow-2xl">
                
                <!-- Options / Metadata -->
                <div class="flex items-center gap-3 px-3 sm:px-4 py-1.5 text-[10px] sm:text-xs font-bold text-slate-400 uppercase tracking-wide">
                    <label class="flex items-center gap-2 cursor-pointer group hover:text-blue-400 transition-colors">
                        <input type="checkbox" id="search-toggle" class="rounded border-slate-600 bg-slate-800/50 text-blue-500 focus:ring-blue-500/30 focus:ring-offset-0 w-3.5 h-3.5 sm:w-4 sm:h-4 transition-all" checked>
                        <span>Recherche Web</span>
                    </label>
                    <div class="h-3 w-[1px] bg-slate-700"></div>
                    <span class="flex items-center gap-1.5">
                        <svg class="w-3 h-3 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                        2.5 Flash
                    </span>
                </div>

                <!-- Input Field -->
                <div class="flex items-end gap-2 sm:gap-3 px-2 pb-1 mt-1">
                    <textarea 
                        id="prompt-input" 
                        rows="1" 
                        class="w-full bg-transparent border-none focus:ring-0 text-slate-100 placeholder-slate-500 py-2 sm:py-3 text-sm sm:text-base resize-none max-h-32 sm:max-h-48 scrollbar-hide outline-none" 
                        placeholder="Transmettre une instruction ou poser une question..."
                    ></textarea>
                    
                    <button id="send-btn" class="bg-blue-600 hover:bg-blue-500 text-white p-3 sm:p-4 rounded-xl sm:rounded-2xl shadow-lg shadow-blue-600/30 disabled:opacity-30 disabled:hover:bg-blue-600 transition-all flex-shrink-0 group mb-1">
                        <svg viewBox="0 0 24 24" class="w-4 h-4 sm:w-5 sm:h-5 transform group-hover:translate-x-0.5 group-hover:-translate-y-0.5 transition-transform" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="22" y1="2" x2="11" y2="13"></line>
                            <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // La clé est fournie par l'environnement d'exécution
        const apiKey = ""; 
        const MODEL = "gemini-2.5-flash-preview-09-2025";
        
        const SYSTEM_PROMPT = `Tu es Nexus Core, une IA de nouvelle génération conçue avec une interface sombre et moderne. 
        Tes réponses doivent être :
        - Extrêmement précises, techniques si nécessaire, et toujours sourcées si la recherche web est activée.
        - Visuellement parfaites en utilisant le Markdown (utilise des listes, du gras, des blocs de code avec la bonne syntaxe, etc.).
        - Directes et structurées : pas de blabla inutile, va droit au but avec élégance.
        - Réponds toujours en Français.`;

        const chatView = document.getElementById('chat-view');
        const input = document.getElementById('prompt-input');
        const sendBtn = document.getElementById('send-btn');
        const searchToggle = document.getElementById('search-toggle');
        const statusDot = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');

        let chatHistory = [];

        // Redimensionnement automatique de la zone de texte
        input.addEventListener('input', () => {
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 192) + 'px'; // Max 48 rem (192px)
        });

        // Appel à l'API Gemini
        async function callAI(text) {
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${apiKey}`;
            
            const payload = {
                contents: [...chatHistory, { role: "user", parts: [{ text: text }] }],
                systemInstruction: { parts: [{ text: SYSTEM_PROMPT }] }
            };

            if (searchToggle.checked) {
                payload.tools = [{ "google_search": {} }];
            }

            // Exponential backoff
            const backoff = [1000, 2000, 4000, 8000, 16000];
            
            for (let i = 0; i <= backoff.length; i++) {
                try {
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.error?.message || `Erreur réseau : ${response.status}`);
                    }

                    const data = await response.json();
                    const choice = data.candidates?.[0];
                    
                    if (!choice) throw new Error("Réponse vide ou bloquée par les filtres de sécurité.");

                    const responseText = choice.content?.parts?.[0]?.text || "*(Aucun texte généré)*";
                    
                    // Extraction des sources
                    let sources = [];
                    const attributions = choice.groundingMetadata?.groundingAttributions;
                    if (attributions && Array.isArray(attributions)) {
                        sources = attributions.map(a => ({ 
                            uri: a.web?.uri, 
                            title: a.web?.title 
                        })).filter(s => s.uri && s.title);
                    }

                    return { text: responseText, sources: sources };

                } catch (e) {
                    if (i === backoff.length) throw e;
                    await new Promise(r => setTimeout(r, backoff[i]));
                }
            }
        }

        // Ajouter un message à l'interface
        function addMessage(role, text, sources = []) {
            const isUser = role === 'user';
            const div = document.createElement('div');
            div.className = `flex ${isUser ? 'justify-end' : 'justify-start'} w-full message-anim`;
            
            const bubble = document.createElement('div');
            bubble.className = `p-4 sm:p-5 max-w-[90%] md:max-w-[85%] ${isUser ? 'chat-bubble-user text-white' : 'chat-bubble-ai text-slate-200'}`;
            
            if (isUser) {
                // Texte brut pour l'utilisateur
                bubble.textContent = text;
                bubble.style.whiteSpace = 'pre-wrap';
            } else {
                // Rendu Markdown pour l'IA (On utilise try catch pour sécuriser)
                try {
                    bubble.innerHTML = `<div class="prose prose-invert prose-sm sm:prose-base max-w-none">${marked.parse(text || "")}</div>`;
                } catch (e) {
                    bubble.innerHTML = `<div class="prose prose-invert prose-sm sm:prose-base max-w-none"><p>${text}</p></div>`;
                }
                
                // Coloration syntaxique sécurisée
                bubble.querySelectorAll('pre code').forEach(block => {
                    try {
                        hljs.highlightElement(block);
                    } catch (e) {
                        console.warn("Erreur de coloration syntaxique", e);
                    }
                });

                // Affichage des sources
                if (sources.length > 0) {
                    const sContainer = document.createElement('div');
                    sContainer.className = "mt-4 pt-3 border-t border-slate-700/50 flex flex-wrap gap-2";
                    
                    const sourceLabel = document.createElement('span');
                    sourceLabel.className = "text-[10px] uppercase font-bold text-slate-500 w-full mb-1";
                    sourceLabel.textContent = "Sources vérifiées";
                    sContainer.appendChild(sourceLabel);

                    // Supprimer les doublons potentiels d'URL
                    const uniqueSources = Array.from(new Map(sources.map(item => [item.uri, item])).values());

                    uniqueSources.forEach(s => {
                        const a = document.createElement('a');
                        a.href = s.uri;
                        a.target = "_blank";
                        a.rel = "noopener noreferrer";
                        a.className = "flex items-center gap-1.5 text-[11px] px-2.5 py-1.5 bg-slate-800/50 border border-slate-700 hover:bg-blue-500/10 hover:border-blue-500/40 rounded-lg transition-all text-slate-300 hover:text-blue-400 truncate max-w-[200px] sm:max-w-[250px]";
                        
                        a.innerHTML = `<svg class="w-3 h-3 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.828 10.172a4 4 0 00-5.656 0l-4 4a4 4 0 105.656 5.656l1.102-1.101m-.758-4.899a4 4 0 005.656 0l4-4a4 4 0 00-5.656-5.656l-1.1 1.1"></path></svg>
                                       <span class="truncate">${s.title}</span>`;
                        sContainer.appendChild(a);
                    });
                    bubble.appendChild(sContainer);
                }
            }

            div.appendChild(bubble);
            chatView.appendChild(div);
            scrollToBottom();
        }

        function scrollToBottom() {
            setTimeout(() => {
                chatView.scrollTo({ top: chatView.scrollHeight, behavior: 'smooth' });
            }, 50);
        }

        // Gérer le cycle de chargement
        function setLoading(isLoading) {
            sendBtn.disabled = isLoading;
            input.disabled = isLoading;
            
            if (isLoading) {
                statusDot.style.background = '#3b82f6';
                statusDot.style.boxShadow = '0 0 12px #3b82f6';
                statusText.textContent = "Traitement...";
                statusText.classList.replace('text-slate-400', 'text-blue-400');
                
                const loaderDiv = document.createElement('div');
                loaderDiv.id = 'msg-loading';
                loaderDiv.className = 'flex justify-start w-full message-anim';
                loaderDiv.innerHTML = `
                    <div class="chat-bubble-ai p-5 px-6 max-w-[85%] flex items-center h-12">
                        <div class="dot-flashing ml-3"></div>
                    </div>`;
                chatView.appendChild(loaderDiv);
                scrollToBottom();
            } else {
                statusDot.style.background = '#22c55e';
                statusDot.style.boxShadow = '0 0 12px #22c55e';
                statusText.textContent = "Système En Ligne";
                statusText.classList.replace('text-blue-400', 'text-slate-400');
                
                const loader = document.getElementById('msg-loading');
                if (loader) loader.remove();
            }
        }

        // Action d'envoi
        async function handleSend() {
            const val = input.value.trim();
            if (!val || sendBtn.disabled) return;

            input.value = '';
            input.style.height = 'auto';
            
            addMessage('user', val);
            setLoading(true);

            try {
                const res = await callAI(val);
                
                chatHistory.push({ role: "user", parts: [{ text: val }] });
                chatHistory.push({ role: "model", parts: [{ text: res.text }] });
                
                setLoading(false);
                addMessage('model', res.text, res.sources);
                
            } catch (err) {
                setLoading(false);
                addMessage('model', `**RUPTURE DE CONNEXION**\n\nErreur rencontrée : \`${err.message}\`\n\n*Veuillez vérifier votre connexion ou reformuler votre requête.*`);
            }
        }

        // Écouteurs d'événements
        sendBtn.addEventListener('click', handleSend);
        
        input.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault(); 
                handleSend();
            }
        });

        document.getElementById('clear-btn').addEventListener('click', () => {
            chatHistory = [];
            const welcomeMessage = chatView.firstElementChild;
            chatView.innerHTML = '';
            chatView.appendChild(welcomeMessage);
            
            const confirmDiv = document.createElement('div');
            confirmDiv.className = "text-center text-xs text-slate-500 font-medium py-4 message-anim";
            confirmDiv.textContent = "— Mémoire contextuelle purgée —";
            chatView.appendChild(confirmDiv);
            scrollToBottom();
        });

    </script>
</body>
</html>
