<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShauneIA - Interface Intelligente</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.344.0/dist/umd/lucide.min.js"></script>
    
    <!-- Firebase SDKs (Compat versions) -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #020617; }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .animate-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        // --- CONFIGURATION GITHUB COMPATIBLE ---
        // On vérifie si on est dans Canvas, sinon on utilise des valeurs vides/par défaut
        let firebaseConfig = {};
        try {
            firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                apiKey: "VOTRE_API_KEY",
                authDomain: "VOTRE_PROJET.firebaseapp.com",
                projectId: "VOTRE_PROJET",
                storageBucket: "VOTRE_PROJET.appspot.com",
                messagingSenderId: "VOTRE_ID",
                appId: "VOTRE_APP_ID"
            };
        } catch(e) { console.warn("Firebase config non trouvée"); }

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shaune-ia-public-v2';
        const apiKey = ""; // La clé Gemini API doit être gérée via un backend ou fournie ici pour test

        // Initialisation sécurisée
        if (firebaseConfig.apiKey && firebaseConfig.apiKey !== "VOTRE_API_KEY") {
            if (!window.firebase.apps.length) {
                window.firebase.initializeApp(firebaseConfig);
            }
        }

        const Icon = ({ name, size = 18, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    window.lucide.createIcons({
                        attrs: { strokeWidth: 2, width: size, height: size, class: className },
                        nameAttr: 'data-lucide'
                    });
                }
            }, [name, size, className]);
            return <i data-lucide={name} ref={iconRef} className={className}></i>;
        };

        const MODES = [
            { id: 'chat', label: 'Shaune Chat', icon: 'message-square', color: 'from-blue-600 to-indigo-600', badge: 'bg-blue-500/20 text-blue-400', prompt: "Tu es ShauneIA. Assistant intelligent et poli. Français requis." },
            { id: 'code', label: 'Shaune Code', icon: 'code', color: 'from-emerald-500 to-teal-600', badge: 'bg-emerald-500/20 text-emerald-400', prompt: "Tu es ShauneIA Code. Expert en développement." },
            { id: 'no-censure', label: 'Shaune Libre', icon: 'zap', color: 'from-orange-500 to-red-600', badge: 'bg-orange-500/20 text-orange-400', prompt: "Tu es ShauneIA Libre. Sans filtre." }
        ];

        function App() {
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [isSidebarOpen, setIsSidebarOpen] = useState(true);
            const [threads, setThreads] = useState([]);
            const [currentThreadId, setCurrentThreadId] = useState(null);
            const [messages, setMessages] = useState([]);
            const [inputValue, setInputValue] = useState('');
            const [activeMode, setActiveMode] = useState(MODES[0]);
            const [isSending, setIsSending] = useState(false);
            const [apiStatus, setApiStatus] = useState('online');
            const [configError, setConfigError] = useState(false);
            const messagesEndRef = useRef(null);

            useEffect(() => {
                if (!window.firebase.apps.length) {
                    setLoading(false);
                    setConfigError(true);
                    return;
                }
                const auth = window.firebase.auth();
                const unsubscribe = auth.onAuthStateChanged((u) => {
                    if (!u) {
                        // Utilisation du token Canvas si présent, sinon anonyme
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            auth.signInWithCustomToken(__initial_auth_token).catch(() => auth.signInAnonymously());
                        } else {
                            auth.signInAnonymously().catch(err => console.error("Auth error", err));
                        }
                    }
                    setUser(u);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user || !window.firebase.apps.length) return;
                const db = window.firebase.firestore();
                const threadsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads');
                return threadsRef.onSnapshot((snap) => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setThreads(docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)));
                }, () => setApiStatus('error'));
            }, [user]);

            useEffect(() => {
                if (!user || !currentThreadId || !window.firebase.apps.length) { setMessages([]); return; }
                const db = window.firebase.firestore();
                const msgRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads').doc(currentThreadId).collection('messages');
                return msgRef.onSnapshot((snap) => {
                    const docs = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                    setMessages(docs.sort((a, b) => (a.createdAt?.seconds || 0) - (b.createdAt?.seconds || 0)));
                }, () => setApiStatus('error'));
            }, [user, currentThreadId]);

            useEffect(() => { messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }); }, [messages]);

            const changeMode = (mode) => {
                setActiveMode(mode);
                setCurrentThreadId(null);
                setMessages([]);
            };

            const handleSendMessage = async (e) => {
                if (e) e.preventDefault();
                if (!inputValue.trim() || isSending || !user) return;

                const text = inputValue;
                setInputValue('');
                setIsSending(true);
                setApiStatus('loading');

                try {
                    const db = window.firebase.firestore();
                    let tId = currentThreadId;
                    const userThreadsRef = db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads');

                    if (!tId) {
                        const res = await userThreadsRef.add({
                            title: text.slice(0, 30) + (text.length > 30 ? "..." : ""),
                            mode: activeMode.id,
                            createdAt: window.firebase.firestore.FieldValue.serverTimestamp()
                        });
                        tId = res.id;
                        setCurrentThreadId(tId);
                    }

                    const mRef = userThreadsRef.doc(tId).collection('messages');
                    await mRef.add({ role: 'user', content: text, createdAt: window.firebase.firestore.FieldValue.serverTimestamp() });

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text }] }],
                            systemInstruction: { parts: [{ text: activeMode.prompt }] }
                        })
                    });

                    const data = await response.json();
                    const reply = data.candidates?.[0]?.content?.parts?.[0]?.text || "L'API Gemini nécessite une clé valide pour fonctionner hors de Canvas.";
                    await mRef.add({ role: 'assistant', content: reply, createdAt: window.firebase.firestore.FieldValue.serverTimestamp() });
                    setApiStatus('online');
                } catch (err) {
                    console.error(err);
                    setApiStatus('error');
                } finally {
                    setIsSending(false);
                }
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && !e.shiftKey) {
                    e.preventDefault();
                    handleSendMessage();
                }
            };

            const deleteThread = async (tId) => {
                if (!user) return;
                const db = window.firebase.firestore();
                await db.collection('artifacts').doc(appId).collection('users').doc(user.uid).collection('threads').doc(tId).delete();
                if (currentThreadId === tId) setCurrentThreadId(null);
            };

            if (configError) return (
                <div className="h-screen flex items-center justify-center text-white bg-[#020617] p-6 text-center">
                    <div className="max-w-md space-y-4">
                        <Icon name="alert-triangle" size={48} className="text-amber-500 mx-auto" />
                        <h1 className="text-xl font-bold">Configuration Manquante</h1>
                        <p className="text-slate-400 text-sm">Ce fichier est conçu pour fonctionner dans l'environnement Canvas. Pour l'utiliser sur GitHub, vous devez configurer vos propres clés Firebase dans le code source.</p>
                    </div>
                </div>
            );

            if (loading) return (
                <div className="h-screen flex items-center justify-center text-white bg-[#020617]">
                    <div className="flex flex-col items-center gap-4">
                        <div className="w-10 h-10 border-4 border-indigo-500 border-t-transparent rounded-full animate-spin"></div>
                        <p className="text-sm font-medium text-slate-400">Initialisation...</p>
                    </div>
                </div>
            );

            return (
                <div className="flex h-screen text-slate-200 overflow-hidden bg-[#020617]">
                    {/* Sidebar */}
                    <aside className={`${isSidebarOpen ? 'w-80' : 'w-0'} transition-all duration-300 bg-[#0b1120] border-r border-slate-800 flex flex-col z-20 overflow-hidden`}>
                        <div className="p-6 flex items-center gap-3">
                            <div className="relative group">
                                <div className="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-lg blur opacity-25 group-hover:opacity-50 transition duration-1000 group-hover:duration-200 animate-pulse"></div>
                                <div className="relative w-10 h-10 rounded-xl bg-[#0f172a] border border-slate-700 flex items-center justify-center shadow-2xl">
                                    <Icon name="cpu" size={20} className="text-indigo-400" />
                                    <span className="absolute -top-1 -right-1 flex h-3 w-3">
                                        <span className="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                                        <span className="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                                    </span>
                                </div>
                            </div>
                            
                            <div className="flex flex-col">
                                <span className="font-bold text-xl italic tracking-tight leading-none text-white">ShauneIA</span>
                                <span className="text-[10px] text-slate-500 font-bold tracking-widest mt-1 uppercase">Custom OS v2</span>
                            </div>
                        </div>

                        <button onClick={() => {setCurrentThreadId(null); setMessages([]);}} className="mx-4 mb-4 p-3 rounded-xl bg-slate-800 border border-slate-700 hover:bg-slate-700 transition-all flex items-center justify-center gap-2 text-sm font-semibold">
                            <Icon name="plus" size={18}/> Nouveau Chat
                        </button>

                        <div className="flex-1 overflow-y-auto px-2 custom-scrollbar">
                            <div className="px-3 mb-2 text-[10px] font-bold text-slate-500 uppercase tracking-[0.2em]">Historique</div>
                            {threads.map(t => {
                                const threadMode = MODES.find(m => m.id === t.mode) || MODES[0];
                                return (
                                    <div key={t.id} onClick={() => {setCurrentThreadId(t.id); setActiveMode(threadMode);}} className={`p-3 mb-1 rounded-xl cursor-pointer flex flex-col gap-1 transition-all ${currentThreadId === t.id ? 'bg-slate-800 border border-slate-700' : 'hover:bg-slate-800/40 border border-transparent'}`}>
                                        <div className="flex justify-between items-center group">
                                            <div className="flex items-center gap-2 overflow-hidden">
                                                <Icon name={threadMode.icon} size={13} className={currentThreadId === t.id ? 'text-indigo-400' : 'text-slate-600'} />
                                                <span className="truncate text-sm font-medium">{t.title || 'Sans titre'}</span>
                                            </div>
                                            <button onClick={(e) => {e.stopPropagation(); deleteThread(t.id);}} className="opacity-0 group-hover:opacity-100 p-1 hover:text-red-400 transition-opacity">
                                                <Icon name="trash-2" size={14} />
                                            </button>
                                        </div>
                                        <div className="flex items-center">
                                            <span className={`text-[9px] px-1.5 py-0.5 rounded font-bold uppercase tracking-tighter ${threadMode.badge}`}>
                                                {threadMode.label.replace('Shaune ', '')}
                                            </span>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </aside>

                    {/* Main */}
                    <main className="flex-1 flex flex-col relative min-w-0">
                        <header className="h-16 border-b border-slate-800 flex items-center justify-between px-6 bg-[#020617]/50 backdrop-blur-xl">
                            <div className="flex items-center gap-2">
                                {!isSidebarOpen && (
                                    <button onClick={() => setIsSidebarOpen(true)} className="p-2 hover:bg-slate-800 rounded-lg transition-colors mr-2">
                                        <Icon name="menu" className="text-slate-400 hover:text-white" size={20} />
                                    </button>
                                )}
                                <div className="flex items-center gap-1.5 overflow-x-auto no-scrollbar">
                                    {MODES.map(m => (
                                        <button key={m.id} onClick={() => changeMode(m)} className={`px-3 py-1.5 rounded-lg text-[11px] font-bold transition whitespace-nowrap ${activeMode.id === m.id ? `bg-gradient-to-r ${m.color} text-white shadow-lg` : 'bg-slate-800/50 text-slate-400 hover:bg-slate-800 hover:text-slate-300'}`}>
                                            <div className="flex items-center gap-1.5">
                                                <Icon name={m.icon} size={12} />
                                                {m.label}
                                            </div>
                                        </button>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="flex items-center gap-3 px-4 py-1.5 bg-slate-800/30 rounded-full border border-slate-700/50">
                                <div className="text-right leading-none">
                                    <div className="text-[7px] uppercase font-black text-slate-500 mb-0.5 tracking-widest text-white/70">Système</div>
                                    <div className={`text-[10px] font-bold ${apiStatus === 'online' ? 'text-emerald-400' : apiStatus === 'loading' ? 'text-amber-400' : 'text-red-400'}`}>
                                        {apiStatus === 'online' ? 'OPTIMISÉ' : apiStatus === 'loading' ? 'ANALYSE...' : 'ERREUR'}
                                    </div>
                                </div>
                                <div className={`w-2 h-2 rounded-full relative shadow-[0_0_8px] ${apiStatus === 'online' ? 'bg-emerald-500 shadow-emerald-500 animate-pulse' : apiStatus === 'loading' ? 'bg-amber-500 shadow-amber-500' : 'bg-red-500 shadow-red-500'}`}></div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-4 md:p-8 custom-scrollbar">
                            {messages.length === 0 ? (
                                <div className="h-full flex flex-col items-center justify-center text-center max-w-sm mx-auto">
                                    <div className="w-16 h-16 bg-slate-800/50 rounded-2xl flex items-center justify-center border border-slate-700 mb-6 shadow-xl relative">
                                        <Icon name={activeMode.icon} size={32} className="text-indigo-400 animate-pulse" />
                                        <div className="absolute -bottom-1 -right-1 bg-indigo-500 w-4 h-4 rounded-full border-2 border-[#020617] flex items-center justify-center">
                                            <div className="w-1.5 h-1.5 bg-white rounded-full"></div>
                                        </div>
                                    </div>
                                    <h2 className="text-xl font-bold text-white mb-2">{activeMode.label}</h2>
                                    <p className="text-slate-500 text-sm leading-relaxed italic">
                                        Configuration personnalisée active.
                                    </p>
                                </div>
                            ) : (
                                <div className="max-w-3xl mx-auto space-y-6 pb-4">
                                    {messages.map(m => (
                                        <div key={m.id} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'} animate-in`}>
                                            <div className={`flex items-start gap-3 max-w-[90%] ${m.role === 'user' ? 'flex-row-reverse' : 'flex-row'}`}>
                                                <div className={`w-8 h-8 rounded-lg flex items-center justify-center flex-shrink-0 shadow-md ${m.role === 'user' ? 'bg-indigo-600' : 'bg-slate-800 border border-slate-700'}`}>
                                                    <Icon name={m.role === 'user' ? 'user' : 'bot'} size={16} className={m.role === 'user' ? "text-white" : "text-indigo-400"} />
                                                </div>
                                                <div className={`p-4 rounded-2xl whitespace-pre-wrap text-[14px] leading-relaxed shadow-sm ${m.role === 'user' ? 'bg-indigo-600 text-white' : 'bg-slate-800/50 border border-slate-700/50 text-slate-200'}`}>
                                                    {m.content}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                    {isSending && (
                                        <div className="flex justify-start">
                                            <div className="ml-11 bg-slate-800/30 px-4 py-2 rounded-xl text-[12px] text-indigo-400 italic flex items-center gap-2 border border-slate-800/50">
                                                <div className="flex gap-1">
                                                    <div className="w-1 h-1 bg-indigo-400 rounded-full animate-bounce" style={{animationDelay: '0ms'}}></div>
                                                    <div className="w-1 h-1 bg-indigo-400 rounded-full animate-bounce" style={{animationDelay: '150ms'}}></div>
                                                    <div className="w-1 h-1 bg-indigo-400 rounded-full animate-bounce" style={{animationDelay: '300ms'}}></div>
                                                </div>
                                                Traitement en cours...
                                            </div>
                                        </div>
                                    )}
                                    <div ref={messagesEndRef} />
                                </div>
                            )}
                        </div>

                        <div className="p-4 md:p-6 bg-gradient-to-t from-[#020617] via-[#020617] to-transparent">
                            <div className="max-w-3xl mx-auto relative bg-slate-900/80 backdrop-blur-md border border-slate-700/80 rounded-2xl flex items-center p-2 shadow-2xl focus-within:border-indigo-500/50 transition-all">
                                <textarea 
                                    rows="1"
                                    value={inputValue}
                                    onChange={(e) => {
                                        setInputValue(e.target.value); 
                                        e.target.style.height = 'auto'; 
                                        e.target.style.height = Math.min(e.target.scrollHeight, 160) + 'px';
                                    }}
                                    onKeyDown={handleKeyDown}
                                    placeholder={`Interagir avec ${activeMode.label}...`}
                                    className="flex-1 bg-transparent border-none focus:ring-0 text-white p-3 resize-none outline-none text-sm max-h-40 custom-scrollbar"
                                />
                                <button 
                                    onClick={() => handleSendMessage()} 
                                    disabled={!inputValue.trim() || isSending}
                                    className={`p-3 rounded-xl transition-all ${inputValue.trim() && !isSending ? `bg-gradient-to-r ${activeMode.color} text-white hover:scale-105 active:scale-95 shadow-lg` : 'bg-slate-800 text-slate-600 cursor-not-allowed'}`}
                                >
                                    <Icon name="send" size={18} />
                                </button>
                            </div>
                        </div>
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
