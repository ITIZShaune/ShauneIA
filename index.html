<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShauneIA - Mémoire Étendue</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            overflow: hidden;
            background-color: #05070a;
            color: #e2e8f0;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #334155; }
        
        .animate-in { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; opacity: 0; transform: translateY(10px); }
        @keyframes fadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        #sidebar { transition: width 0.3s ease, opacity 0.3s ease; }
        #sidebar.closed { width: 0; opacity: 0; border-width: 0; }
        
        .code-block-container { margin: 12px 0; border-radius: 12px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); background: #010204; }
        .code-header { background: #111827; padding: 8px 16px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .code-lang { font-family: monospace; font-size: 11px; color: #94a3b8; font-weight: bold; text-transform: uppercase; }
        .copy-btn { font-size: 10px; color: #64748b; cursor: pointer; display: flex; align-items: center; gap: 4px; transition: color 0.2s; }
        .copy-btn:hover { color: #fff; }
        pre.code-content { padding: 16px; overflow-x: auto; font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px; line-height: 1.6; color: #e2e8f0; }
    </style>
</head>
<body class="flex h-screen selection:bg-indigo-500/30">

    <!-- Sidebar -->
    <aside id="sidebar" class="w-80 bg-[#0a0d14] border-r border-slate-800/50 flex flex-col z-30 shrink-0">
        <div class="p-6 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-500/20">
                    <i data-lucide="infinity" class="text-white w-6 h-6"></i>
                </div>
                <h1 class="text-xl font-bold tracking-tight text-white">ShauneIA</h1>
            </div>
        </div>

        <button onclick="startNewThread()" class="mx-4 mb-6 flex items-center justify-center gap-2 p-3 rounded-xl bg-white/5 border border-white/10 hover:bg-white/10 transition-all text-sm font-medium text-slate-300 hover:text-white group">
            <i data-lucide="plus" class="w-4 h-4 group-hover:rotate-90 transition-transform"></i>
            Nouvelle discussion
        </button>

        <div class="flex-1 overflow-y-auto px-3 space-y-1 custom-scrollbar" id="history-list"></div>

        <div class="p-4 border-t border-slate-800/50 bg-[#080a0f]">
            <div class="flex items-center gap-3 p-3 rounded-xl bg-slate-900/50 border border-slate-800">
                <div class="w-8 h-8 rounded-full bg-indigo-500/20 flex items-center justify-center text-indigo-400 border border-indigo-500/30">
                    <i data-lucide="user" class="w-4 h-4"></i>
                </div>
                <div class="flex-1 min-w-0">
                    <p class="text-xs font-semibold text-white truncate">Utilisateur Pro</p>
                    <p class="text-[10px] text-slate-500 truncate">Sauvegarde Locale Active</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col relative bg-[radial-gradient(circle_at_50%_0%,_#111827_0%,_#05070a_100%)] min-w-0">
        <header class="h-16 flex items-center justify-between px-6 border-b border-white/5 backdrop-blur-xl sticky top-0 z-20 shrink-0">
            <div class="flex items-center gap-4">
                <button onclick="toggleSidebar()" class="p-2 hover:bg-white/5 rounded-lg transition-colors text-slate-400 hover:text-white">
                    <i data-lucide="menu" class="w-5 h-5" id="sidebar-icon"></i>
                </button>
                <div class="h-4 w-[1px] bg-slate-800"></div>
                <div class="flex gap-1 bg-slate-900/80 p-1 rounded-xl border border-white/5" id="mode-selector"></div>
            </div>
            <div class="flex items-center gap-3">
                <div class="px-3 py-1 rounded-full bg-indigo-500/10 border border-indigo-500/20 text-[10px] font-bold text-indigo-400 flex items-center gap-2 uppercase tracking-tighter">
                    <span class="w-1.5 h-1.5 rounded-full bg-indigo-500 animate-pulse"></span>
                    Cerveau Connecté
                </div>
            </div>
        </header>

        <div id="chat-container" class="flex-1 overflow-y-auto custom-scrollbar scroll-smooth"></div>

        <div class="p-4 bg-gradient-to-t from-[#05070a] via-[#05070a] to-transparent shrink-0">
            <div class="max-w-4xl mx-auto">
                <div id="error-banner" class="hidden mb-3 p-3 bg-red-500/10 border border-red-500/20 rounded-xl text-red-400 text-xs flex justify-between items-center animate-in">
                    <span id="error-text">Erreur</span>
                    <button onclick="hideError()"><i data-lucide="x" class="w-4 h-4"></i></button>
                </div>

                <div class="glass-panel rounded-2xl overflow-hidden shadow-2xl shadow-indigo-900/10 transition-all focus-within:border-indigo-500/30">
                    <div id="attachments-preview" class="hidden flex gap-2 p-3 flex-wrap border-b border-white/5 bg-slate-900/30"></div>

                    <div class="flex items-end p-3 gap-2">
                        <button onclick="document.getElementById('file-upload').click()" class="mb-1 p-2.5 text-slate-500 hover:text-indigo-400 hover:bg-slate-800/50 rounded-xl transition-all">
                            <i data-lucide="paperclip" class="w-5 h-5"></i>
                        </button>
                        <input type="file" id="file-upload" multiple class="hidden" onchange="handleFileUpload(event)">
                        
                        <textarea 
                            id="message-input"
                            rows="1" 
                            placeholder="Posez une question à ShauneIA..." 
                            class="flex-1 bg-transparent border-none focus:ring-0 text-sm p-2.5 outline-none resize-none max-h-48 custom-scrollbar leading-relaxed text-slate-200 placeholder-slate-600"
                            oninput="autoResize(this)"
                            onkeydown="handleKeyDown(event)"
                        ></textarea>
                        
                        <button id="send-btn" onclick="sendMessage()" class="mb-1 w-10 h-10 bg-indigo-600 rounded-xl text-white hover:bg-indigo-500 transition-all flex items-center justify-center shadow-lg shadow-indigo-600/20 shrink-0">
                            <i data-lucide="send" class="w-5 h-5 ml-0.5"></i>
                        </button>
                    </div>
                </div>
                
                <div class="mt-3 text-center flex items-center justify-center gap-4 text-[10px] text-slate-600 font-bold uppercase tracking-[0.2em]">
                    <span class="flex items-center gap-1.5"><i data-lucide="brain" class="w-3 h-3 text-indigo-900"></i> Mémoire Contextuelle & Locale</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Clé API et Clé de stockage (Versionnée pour éviter les conflits)
        const API_KEY = "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"; 
        const STORAGE_KEY = "shaune_ia_brain_v4_stable";

        const MODES = [
            { id: 'chat', label: 'Assistant', icon: 'message-square', prompt: "Tu es ShauneIA, un assistant ultra-intelligent doté d'une mémoire parfaite. Tu te souviens de tout ce que l'utilisateur a dit plus tôt dans cette discussion pour fournir des réponses cohérentes." },
            { id: 'code', label: 'Developer', icon: 'code', prompt: "Tu es ShauneIA Code. Expert technique. Tu gardes en mémoire les structures de code précédemment discutées pour proposer des refactorisations ou des suites logiques." },
            { id: 'image', label: 'Artist', icon: 'image', prompt: "Tu es un ingénieur de prompt pour IA génératrice d'images. Réponds uniquement avec le prompt en anglais basé sur les demandes de l'utilisateur." },
            { id: 'libre', label: 'Unfiltered', icon: 'zap', prompt: "Tu es ShauneIA Libre. Pas de filtre, langage brut. Tu te souviens des précédentes provocations ou sujets abordés pour rester dans le ton." }
        ];

        const SUGGESTIONS = [
            { title: "Coder un Cerveau", text: "Comment simuler une mémoire persistante en JS ?", modeId: 'code', icon: 'code' },
            { title: "Récit Continu", text: "Commence une histoire fantastique", modeId: 'chat', icon: 'message-square' },
            { title: "Vision", text: "Un paysage de montagne futuriste", modeId: 'image', icon: 'image' }
        ];

        let threads = [];
        let currentThreadId = null;
        let activeMode = MODES[0];
        let isSidebarOpen = true;
        let isLoading = false;

        // --- INITIALISATION ---
        function init() {
            loadState();
            renderModes();
            renderSidebar();
            renderChat();
            lucide.createIcons();
        }

        // --- SYSTÈME DE SAUVEGARDE LOCALE ---
        function saveState() {
            const state = {
                threads: threads,
                lastThreadId: currentThreadId,
                lastModeId: activeMode.id
            };
            localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        }

        function loadState() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try { 
                    const state = JSON.parse(saved);
                    threads = state.threads || [];
                    currentThreadId = state.lastThreadId || null;
                    const savedMode = MODES.find(m => m.id === state.lastModeId);
                    if (savedMode) activeMode = savedMode;
                } 
                catch (e) { 
                    console.error("Erreur de chargement de la mémoire locale", e); 
                    threads = [];
                }
            }
        }

        function generateId() {
            return Date.now().toString() + Math.random().toString(36).substr(2, 5);
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag] || tag));
        }

        function formatMessageContent(text) {
            const codeBlockRegex = /```(\w*)\n([\s\S]*?)```/g;
            let parts = [];
            let lastIndex = 0;
            let match;

            while ((match = codeBlockRegex.exec(text)) !== null) {
                if (match.index > lastIndex) {
                    parts.push(`<span>${escapeHTML(text.substring(lastIndex, match.index)).replace(/\n/g, '<br>')}</span>`);
                }
                const lang = match[1] || 'code';
                const code = match[2].trim();
                const codeId = 'code-' + Math.random().toString(36).substr(2, 9);
                parts.push(`
                    <div class="code-block-container">
                        <div class="code-header">
                            <span class="code-lang">${lang}</span>
                            <button onclick="copyToClipboard('${codeId}')" class="copy-btn"><i data-lucide="copy" class="w-3 h-3"></i> Copier</button>
                        </div>
                        <pre class="code-content custom-scrollbar" id="${codeId}">${escapeHTML(code)}</pre>
                    </div>
                `);
                lastIndex = codeBlockRegex.lastIndex;
            }
            if (lastIndex < text.length) {
                parts.push(`<span>${escapeHTML(text.substring(lastIndex)).replace(/\n/g, '<br>')}</span>`);
            }
            return parts.length > 0 ? parts.join('') : `<span>${escapeHTML(text).replace(/\n/g, '<br>')}</span>`;
        }

        function copyToClipboard(id) {
            const el = document.getElementById(id);
            const textArea = document.createElement("textarea");
            textArea.value = el.innerText;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            const btn = el.previousElementSibling.querySelector('.copy-btn');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = `<i data-lucide="check" class="w-3 h-3 text-emerald-400"></i> <span class="text-emerald-400">Copié !</span>`;
            lucide.createIcons();
            setTimeout(() => { btn.innerHTML = originalHTML; lucide.createIcons(); }, 2000);
        }

        function toggleSidebar() {
            isSidebarOpen = !isSidebarOpen;
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('sidebar-icon');
            sidebar.classList.toggle('closed', !isSidebarOpen);
            icon.setAttribute('data-lucide', isSidebarOpen ? 'menu' : 'x');
            lucide.createIcons();
        }

        function renderModes() {
            const container = document.getElementById('mode-selector');
            container.innerHTML = MODES.map(m => `
                <button onclick="setMode('${m.id}')" class="flex items-center gap-2 px-4 py-1.5 rounded-lg text-xs font-bold transition-all ${activeMode.id === m.id ? 'bg-indigo-600 text-white shadow-lg shadow-indigo-600/20' : 'text-slate-500 hover:text-slate-300'}">
                    <i data-lucide="${m.icon}" class="w-4 h-4"></i>
                    <span class="hidden sm:inline">${m.label}</span>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function setMode(modeId) {
            activeMode = MODES.find(m => m.id === modeId) || MODES[0];
            renderModes();
            saveState(); // On sauvegarde le changement de mode
        }

        function renderSidebar() {
            const container = document.getElementById('history-list');
            container.innerHTML = `<p class="px-3 pb-2 text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2">Cortex de discussion</p>`;
            if (threads.length === 0) {
                container.innerHTML += `<p class="px-3 text-xs text-slate-600 italic">Mémoire vide</p>`;
                return;
            }
            threads.forEach(t => {
                const modeIcon = (MODES.find(m => m.id === t.mode) || MODES[0]).icon;
                container.innerHTML += `
                    <div onclick="selectThread('${t.id}')" class="group flex items-center justify-between p-3 rounded-xl cursor-pointer transition-all duration-200 ${currentThreadId === t.id ? 'bg-indigo-500/10 border border-indigo-500/20 text-indigo-400' : 'hover:bg-white/5 border border-transparent text-slate-400'}">
                        <div class="flex items-center gap-3 truncate">
                            <i data-lucide="${modeIcon}" class="w-4 h-4 shrink-0"></i>
                            <span class="text-sm truncate font-medium">${escapeHTML(t.title)}</span>
                        </div>
                        <button onclick="deleteThread(event, '${t.id}')" class="opacity-0 group-hover:opacity-100 p-1.5 hover:bg-red-500/20 hover:text-red-400 rounded-lg transition-all">
                            <i data-lucide="trash-2" class="w-3 h-3"></i>
                        </button>
                    </div>
                `;
            });
            lucide.createIcons();
        }

        function renderChat() {
            const container = document.getElementById('chat-container');
            const thread = threads.find(t => t.id === currentThreadId);

            if (!thread || thread.messages.length === 0) {
                container.innerHTML = `
                    <div class="h-full flex flex-col items-center justify-center p-6 max-w-4xl mx-auto space-y-12">
                        <div class="text-center space-y-4 animate-in">
                            <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-purple-600 rounded-3xl flex items-center justify-center text-white mx-auto shadow-2xl shadow-indigo-500/40">
                                <i data-lucide="infinity" class="w-10 h-10"></i>
                            </div>
                            <h2 class="text-4xl font-black text-white tracking-tight">ShauneIA</h2>
                            <p class="text-slate-400 max-w-md mx-auto leading-relaxed">Prêt à entamer une discussion intelligente avec une mémoire de travail persistante et locale.</p>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 w-full max-w-3xl">
                            ${SUGGESTIONS.map((s, i) => `
                                <button onclick="useSuggestion('${s.text}', '${s.modeId}')" class="p-5 bg-slate-900/40 border border-white/5 rounded-2xl text-left hover:bg-slate-800/60 hover:border-indigo-500/30 transition-all group animate-in" style="animation-delay: ${i * 100}ms">
                                    <div class="w-8 h-8 rounded-lg bg-indigo-500/10 flex items-center justify-center text-indigo-400 mb-4 group-hover:bg-indigo-500 group-hover:text-white transition-colors">
                                        <i data-lucide="${s.icon}" class="w-4 h-4"></i>
                                    </div>
                                    <p class="text-sm font-bold text-white mb-1">${escapeHTML(s.title)}</p>
                                    <p class="text-xs text-slate-500 line-clamp-2">${escapeHTML(s.text)}</p>
                                </button>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else {
                let messagesHTML = `<div class="max-w-4xl mx-auto py-10 px-6 space-y-8">`;
                thread.messages.forEach((m, idx) => {
                    const isUser = m.role === 'user';
                    messagesHTML += `
                        <div class="flex gap-6 animate-in group ${isUser ? 'flex-row-reverse' : ''}">
                            <div class="w-10 h-10 rounded-2xl flex items-center justify-center shrink-0 shadow-lg ${isUser ? 'bg-indigo-600 text-white' : 'bg-slate-900 border border-slate-800 text-indigo-400'}">
                                <i data-lucide="${isUser ? 'user' : 'bot'}" class="w-5 h-5"></i>
                            </div>
                            <div class="flex flex-col space-y-3 max-w-[85%] ${isUser ? 'items-end' : 'items-start'}">
                                <div class="p-5 rounded-3xl text-sm leading-relaxed ${isUser ? 'bg-indigo-600 text-white rounded-tr-none' : 'bg-slate-900/50 border border-white/5 text-slate-200 rounded-tl-none backdrop-blur-sm'}">
                                    ${m.isImage ? `<img src="${m.content}" class="rounded-xl border border-white/10 w-full mb-2">` : formatMessageContent(m.content)}
                                </div>
                            </div>
                        </div>
                    `;
                });
                if (isLoading) {
                    messagesHTML += `<div class="flex gap-6 animate-in"><div class="w-10 h-10 rounded-2xl bg-slate-900 flex items-center justify-center text-indigo-400 border border-slate-800"><i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i></div><div class="p-5 rounded-3xl text-sm bg-slate-900/50 border border-white/5 text-slate-400">ShauneIA réfléchit en se basant sur le contexte...</div></div>`;
                }
                messagesHTML += `</div>`;
                container.innerHTML = messagesHTML;
            }
            lucide.createIcons();
            scrollToBottom();
        }

        function startNewThread() { currentThreadId = null; saveState(); renderSidebar(); renderChat(); }
        
        function selectThread(id) { 
            currentThreadId = id; 
            const thread = threads.find(t => t.id === id);
            if (thread && thread.mode) {
                const savedMode = MODES.find(m => m.id === thread.mode);
                if (savedMode) activeMode = savedMode;
            }
            saveState();
            renderModes();
            renderSidebar(); 
            renderChat(); 
        }

        function deleteThread(e, id) { 
            e.stopPropagation(); 
            threads = threads.filter(t => t.id !== id); 
            if (currentThreadId === id) currentThreadId = null; 
            saveState(); 
            renderSidebar(); 
            renderChat(); 
        }

        function useSuggestion(text, modeId) { setMode(modeId); document.getElementById('message-input').value = text; sendMessage(); }
        function handleKeyDown(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
        function scrollToBottom() { const c = document.getElementById('chat-container'); c.scrollTop = c.scrollHeight; }
        function autoResize(el) { el.style.height = 'auto'; el.style.height = el.scrollHeight + 'px'; }

        // --- CORE LOGIC (MEMOIRE ACTIVÉE) ---
        async function sendMessage() {
            const inputEl = document.getElementById('message-input');
            const text = inputEl.value.trim();
            if (!text || isLoading) return;

            isLoading = true;
            inputEl.value = '';
            inputEl.style.height = 'auto';
            document.getElementById('send-btn').disabled = true;

            if (!currentThreadId) {
                currentThreadId = generateId();
                threads.unshift({ id: currentThreadId, title: text.substring(0, 40), mode: activeMode.id, messages: [] });
            }

            const thread = threads.find(t => t.id === currentThreadId);
            thread.messages.push({ role: 'user', content: text });
            
            renderSidebar();
            renderChat();

            try {
                const messagesForApi = [{ role: "system", content: activeMode.prompt }];
                thread.messages.forEach(m => {
                    if (!m.isImage) {
                        messagesForApi.push({ role: m.role, content: m.content });
                    }
                });

                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${API_KEY}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: messagesForApi,
                        temperature: 0.7,
                        max_tokens: 2048
                    })
                });

                if (!response.ok) throw new Error("API Limit reached or error");

                const data = await response.json();
                let aiContent = data.choices[0].message.content;

                if (activeMode.id === 'image') {
                    const cleanPrompt = aiContent.replace(/['"]+/g, '').trim();
                    aiContent = `https://image.pollinations.ai/prompt/${encodeURIComponent(cleanPrompt)}?width=1024&height=1024&nologo=true&seed=${Math.floor(Math.random()*1000)}`;
                }

                thread.messages.push({
                    role: 'assistant',
                    content: aiContent,
                    isImage: activeMode.id === 'image'
                });

            } catch (err) {
                console.error(err);
                const banner = document.getElementById('error-banner');
                const errorText = document.getElementById('error-text');
                errorText.innerText = "Une erreur est survenue lors de la communication avec l'IA.";
                banner.classList.remove('hidden');
            } finally {
                isLoading = false;
                document.getElementById('send-btn').disabled = false;
                saveState(); // Sauvegarde cruciale après chaque message
                renderSidebar();
                renderChat();
            }
        }

        function hideError() {
            document.getElementById('error-banner').classList.add('hidden');
        }

        init();
    </script>
</body>
</html>
